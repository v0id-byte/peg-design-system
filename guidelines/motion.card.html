<!-- @dsCard group="Brand" viewport="700x148" subtitle="Entrance build system — delays & easing" name="Motion Builds" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--paper);font-family:var(--font);padding:18px 24px;-webkit-font-smoothing:antialiased;}
  .row{display:flex;gap:10px;margin-bottom:8px;align-items:center;}
  .chip{background:rgba(22,24,29,.06);border-radius:4px;padding:3px 8px;font-size:11px;font-weight:700;color:var(--ink);font-family:monospace;white-space:nowrap;}
  .bar-wrap{flex:1;position:relative;height:6px;background:rgba(22,24,29,.07);border-radius:3px;}
  .bar-fill{position:absolute;left:0;top:0;height:100%;background:var(--jade);border-radius:3px;}
  .ms{font-size:10.5px;color:var(--mute);font-variant-numeric:tabular-nums;min-width:42px;text-align:right;}
  .divider{border:none;border-top:1px solid rgba(22,24,29,.08);margin:10px 0;}
  .note{font-size:10px;color:var(--mute);line-height:1.5;}
  .note code{font-size:9.5px;background:rgba(22,24,29,.06);border-radius:3px;padding:1px 4px;color:var(--ink);}
</style>
</head>
<body>
  <div class="row"><span class="chip">.d1</span><div class="bar-wrap"><div class="bar-fill" style="width:14%;"></div></div><span class="ms">80 ms</span></div>
  <div class="row"><span class="chip">.d2</span><div class="bar-wrap"><div class="bar-fill" style="width:36%;"></div></div><span class="ms">200 ms</span></div>
  <div class="row"><span class="chip">.d3</span><div class="bar-wrap"><div class="bar-fill" style="width:57%;"></div></div><span class="ms">320 ms</span></div>
  <div class="row"><span class="chip">.d4</span><div class="bar-wrap"><div class="bar-fill" style="width:79%;"></div></div><span class="ms">440 ms</span></div>
  <div class="row"><span class="chip">.d5</span><div class="bar-wrap"><div class="bar-fill" style="width:100%;"></div></div><span class="ms">560 ms</span></div>
  <hr class="divider">
  <div class="note">Duration <strong>820 ms</strong> · <code>cubic-bezier(.2,.65,.2,1)</code> · <code>translateY 22px→0</code> + opacity · resting DOM = end state (no blank exports)</div>
</body>
</html>
