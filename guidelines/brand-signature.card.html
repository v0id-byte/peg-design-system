<!-- @dsCard group="Brand" viewport="700x140" subtitle="The $1.00 peg-line — the system's signature element" name="Peg Line Motif" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--paper);font-family:var(--font);padding:24px 28px;-webkit-font-smoothing:antialiased;}
  .label-row{display:flex;justify-content:space-between;margin-bottom:36px;}
  .ds-label{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--mute);}
  .peg-wrap{position:relative;width:100%;height:2px;margin-bottom:28px;}
  .peg-line{position:absolute;inset:0;border-top:2px solid var(--ink);}
  .peg-line.faint{border-top-color:rgba(22,24,29,.22);}
  .peg-dollar{position:absolute;right:18px;top:-22px;font-size:12px;color:var(--mute);font-variant-numeric:tabular-nums;letter-spacing:.02em;}
  .peg-dot{position:absolute;right:-5px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--jade);}
  .desc{font-size:11px;color:var(--mute);line-height:1.5;}
  .desc b{color:var(--ink);font-weight:600;}
</style>
</head>
<body>
  <div class="label-row">
    <span class="ds-label">Default</span>
    <span class="ds-label" style="margin-right:320px;">Faint variant</span>
  </div>
  <div style="display:flex;gap:32px;align-items:center;margin-bottom:20px;">
    <div style="flex:1;position:relative;height:12px;">
      <div class="peg-line"></div>
      <div class="peg-dollar">$1.00</div>
      <div class="peg-dot"></div>
    </div>
    <div style="flex:1;position:relative;height:12px;">
      <div class="peg-line faint"></div>
    </div>
  </div>
  <div class="desc"><b>Jade dot</b> at the right end signals the peg is held. <b>Faint</b> (22% opacity) is used as a background reference line when the chart shows a break.</div>
</body>
</html>
