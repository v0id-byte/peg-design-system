document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ce;}\n  .support{font-size:var(--fz-support);font-weight:400;line-height:1.4;color:var(--ink);}\n  .caption{font-size:var(--fz-caption);font-weight:400;color:var(--mute);letter-spacing:0;}\n  .jade{color:var(--jade);}\n  .alert{color:var(--alert);}\n  .mute{color:var(--mute);}\n  .tnum{font-variant-numeric:tabular-nums;}\n  .foot-src{position:absolute;left:var(--margin);bottom:64px;font-size:var(--fz-caption);color:var(--mute);letter-spacing:0;max-width:1100px;}\n  .foot-num{position:absolute;right:var(--margin);bottom:64px;font-size:var(--fz-caption);color:var(--mute);font-variant-numeric:tabular-nums;letter-spacing:0.04em;}\n  /* peg line */\n  .peg{position:absolute;left:var(--peg-x0);top:var(--peg-y);width:calc(var(--peg-x1) - var(--peg-x0));height:0;}\n  .peg::before{content:\"\";position:absolute;left:0;right:0;top:0;border-top:2px solid var(--ink);}\n  .peg.faint::before{border-top-color:rgba(22,24,29,0.22);}\n  .peg .peg-label{position:absolute;left:0;top:-46px;font-size:var(--fz-caption);color:var(--mute);font-variant-numeric:tabular-nums;letter-spacing:0.02em;}\n  .peg .peg-dot{position:absolute;right:-6px;top:-5px;width:10px;height:10px;border-radius:50%;background:var(--jade);}\n  /* flow */\n  .flow{position:absolute;left:var(--margin);right:var(--margin);top:505px;display:flex;align-items:center;}\n  .flow .node{flex:0 0 auto;font-size:52px;font-weight:600;letter-spacing:-0.02em;line-height:1.05;white-space:nowrap;color:var(--ink);}\n  .flow .node.jade{color:var(--jade);}\n  .flow .conn{flex:1 1 0;height:2px;background:rgba(22,24,29,0.22);position:relative;margin:0 46px;}\n  .flow .conn::after{content:\"\";position:absolute;right:-1px;top:50%;transform:translateY(-50%);\n        border-left:15px solid rgba(22,24,29,0.34);\n        border-top:9px solid transparent;border-bottom:9px solid transparent;}\n  .count{font-variant-numeric:tabular-nums;}\n  .attrs{display:flex;flex-direction:column;gap:42px;}\n  .attrs .attr{font-size:42px;font-weight:400;line- tems:center;text-align:center;\">\n      <div class=\"headline build d1\" style=\"max-width:1500px;\"><span class=\"jade\">2025:<\u002Fspan> the year everyone rushed in.<\u002Fdiv>\n      <div class=\"caption build d3\" style=\"margin-top:80px;letter-spacing:0.18em;text-transform:uppercase;font-size:24px;\">\n        US&nbsp;&nbsp;·&nbsp;&nbsp;Hong&nbsp;Kong&nbsp;&nbsp;·&nbsp;&nbsp;EU&nbsp;&nbsp;·&nbsp;&nbsp;UK&nbsp;&nbsp;·&nbsp;&nbsp;Singapore&nbsp;&nbsp;·&nbsp;&nbsp;Korea\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-src\">GENIUS Act, Pub. L. 119–27 (2025); HK Stablecoins Ordinance (2025)<\u002Fdiv>\n    <div class=\"foot-num\">02<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════ SLIDE 03 · What it actually is ════════════════════ -->\n  <section class=\"paper\" data-label=\"What it actually is\">\n    <div class=\"frame\">\n      <div class=\"headline build d1\" style=\"position:absolute;left:0;top:0;\">A private digital dollar.<\u002Fdiv>\n      <div class=\"subhead build d2\" style=\"position:absolute;left:0;top:250px;max-width:1520px;font-weight:500;font-size:46px;line-height:1.32;color:var(--ink);\">\n        A token you can always redeem for <span class=\"jade\">$1<\u002Fspan> — really an IOU on the company that issued it, backed 1:1 by reserves it holds.\n      <\u002Fdiv>\n      <div class=\"stats build d3\" style=\"position:absolute;left:2px;top:560px;\">\n        <div class=\"stat\"><div class=\"stat-n count\" data-to=\"84\" data-suf=\"%\" data-cdelay=\"360\">84%<\u002Fdiv><div class=\"stat-l\">of the market is<br>USDT + USDC<\u002Fdiv><\u002Fdiv>\n        <div class=\"stat\"><div class=\"stat-n count\" data-to=\"306\" data-pre=\"$\" data-suf=\"B\" data-cdelay=\"360\">$306B<\u002Fdiv><div class=\"stat-l\">total market size<br>end of 2025<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-src\">Decrypt / DeFiLlama (2025); Brookings (2025)<\u002Fdiv>\n    <div class=\"foot-num\">03<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════ SLIDE 04 · Two types ════════════════════ -->\n  <section class=\"paper\" data-label=\"Two types\">\n    <div class=\"frame\">\n      <div class=\"headline build d1\" style=\"position:absolute;left:0;top:0;\">Not all \"stable\" coins work the same way.<\u002Fdiv>\n      <div class=\"build d2\" style=\"position:absolute;left:0;top:215px;right:0;display:grid;grid-template-columns:1fr 1fr;gap:100px;\">\n        <div style=\"border-top:3px solid var(--jade);padding-top:40px;\">\n          <div style=\"font-size:24px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--jade);margin-bottom:24px;\">Collateralized<\u002Fdiv>\n          <div style=\"font-size:56px;font-weight:700;letter-spacing:-0.025em;line-height:1.1;margin-bottom:26px;\">Backed by<br>real assets<\u002Fdiv>\n          <div style=\"font-size:34px;color:var(--mute);line-height:1.44;margin-bottom:26px;\">Each token matched 1:1 with cash, US Treasuries, or other safe assets held in reserve.<\u002Fdiv>\n          <div style=\"font-size:34px;font-weight:600;color:var(--ink);\">USDT · USDC<\u002Fdiv>\n          <div style=\"margin-top:14px;font-size:27px;color:var(--jade);font-weight:500;\">← This deck's focus<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-top:3px solid rgba(22,24,29,0.14);padding-top:40px;\">\n          <div style=\"font-size:24px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--mute);margin-bottom:24px;\">Algorithmic<\u002Fdiv>\n          <div style=\"font-size:56px;font-weight:700;letter-spacing:-0.025em;line-height:1.1;color:var(--mute);margin-bottom:26px;\">Held by<br>math alone<\u002Fdiv>\n          <div style=\"font-size:34px;color:var(--mute);line-height:1.44;margin-bottom:26px;\">No real reserves — a formula was supposed to maintain the $1 peg through code and incentives.<\u002Fdiv>\n          <div style=\"font-size:34px;font-weight:600;color:var(--alert);\">UST · collapsed 2022<\u002Fdiv>\n          <div style=\"margin-top:14px;font-size:27px;color:var(--mute);\">~$40B gone in days<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-src\">Brookings (2025); BIS FSI Briefs No. 27 (2025)<\u002Fdiv>\n    <div class=\"foot-num\">04<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════ SLIDE 05 · Where does it fit? ════════════════════ -->\n  <section class=\"paper\" data-label=\"Where does it fit?\">\n    <div class=\"frame\">\n      <div class=\"headline build d1\" style=\"position:absolute;left:0;top:0;\">Where does a stablecoin fit?<\u002Fdiv>\n      <div class=\"build d2\" style=\"position:absolute;left:0;top:188px;right:0;\">\n        <div style=\"display:grid;grid-template-columns:200px 1fr 1fr 1fr;padding-bottom:20px;border-bottom:2px solid var(--ink);\">\n          <div><\u002Fdiv>\n          <div style=\"font-size:40px;font-weight:600;letter-spacing:-0.015em;\">Cash<\u002Fdiv>\n          <div style=\"font-size:40px;font-weight:600;letter-spacing:-0.015em;\">Bank deposit<\u002Fdiv>\n          <div style=\"font-size:40px;font-weight:600;letter-spacing:-0.015em;color:var(--jade);\">Stablecoin<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:200px 1fr 1fr 1fr;padding:20px 0;border-bottom:1px solid rgba(22,24,29,0.1);\">\n          <div style=\"font-size:24px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--mute);align-self:center;\">Safety<\u002Fdiv>\n          <div style=\"font-size:30px;color:var(--ink);line-height:1.38;\">Gov't backed<br><span style=\"color:var(--mute);font-size:25px;\">legal tender<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:30px;color:var(--ink);line-height:1.38;\">Deposit insurance<br><span style=\"color:var(--mute);font-size:25px;\">up to $250k (US)<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:30px;color:var(--ink);line-height:1.38;\">Commercial credit<br><span style=\"color:var(--mute);font-size:25px;\">issuer's liability only<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:200px 1fr 1fr 1fr;padding:20px 0;border-bottom:1px solid rgba(22,24,29,0.1);\">\n          <div style=\"font-size:24px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--mute);align-self:center;\">Interest<\u002Fdiv>\n          <div style=\"font-size:30px;color:var(--ink);\">None<\u002Fdiv>\n          <div style=\"font-size:30px;color:var(--ink);line-height:1.38;\">Low<br><span style=\"color:var(--mute);font-size:25px;\">~0.5–5% p.a.<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:30px;color:var(--ink);line-height:1.38;\">None to you<br><span style=\"color:var(--jade);font-size:25px;font-weight:600;\">issuer keeps it all<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:200px 1fr 1fr 1fr;padding:20px 0;border-bottom:1px solid rgba(22,24,29,0.1);\">\n          <div style=\"font-size:24px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--mute);align-self:center;\">Speed<\u002Fdiv>\n          <div style=\"font-size:30px;color:var(--ink);line-height:1.38;\">Instant<br><span style=\"color:var(--mute);font-size:25px;\">physical only<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:30px;color:var(--ink);line-height:1.38;\">1–3 days<br><span style=\"color:var(--mute);font-size:25px;\">cross-border wire<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:30px;color:var(--jade);font-weight:600;line-height:1.38;\">Minutes, 24/7<br><span style=\"color:var(--mute);font-size:25px;font-weight:400;\">global, any hour<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:200px 1fr 1fr 1fr;padding:20px 0;\">\n          <div style=\"font-size:24px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--mute);align-self:center;\">Access<\u002Fdiv>\n          <div style=\"font-size:30px;color:var(--ink);line-height:1.38;\">Physical only<br><span style=\"color:var(--mute);font-size:25px;\">must be present<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:30px;color:var(--ink);line-height:1.38;\">Requires a<br><span style=\"color:var(--mute);font-size:25px;\">bank account<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:30px;color:var(--jade);font-weight:600;line-height:1.38;\">Phone only<br><span style=\"color:var(--mute);font-size:25px;font-weight:400;\">no bank needed<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-src\">BIS FSI Briefs No. 27 (2025); Brookings (2025)<\u002Fdiv>\n    <div class=\"foot-num\">05<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════ SLIDE 06 · Financial properties ════════════════════ -->\n  <section class=\"paper\" data-label=\"Financial properties\">\n    <div class=\"frame\">\n      <div class=\"headline build d1\" style=\"position:absolute;left:0;top:0;\">So what kind of money is it?<\u002Fdiv>\n      <div class=\"attrs build d2\" style=\"position:absolute;left:0;top:300px;max-width:1560px;\">\n        <div class=\"attr\"><b>Stable by design<\u002Fb> — pegged to $1<\u002Fdiv>\n        <div class=\"attr\"><b class=\"k-jade\">Fully backed<\u002Fb> — a redeemable claim on reserves<\u002Fdiv>\n        <div class=\"attr\"><b>Earns the issuer, not you<\u002Fb> — pays no interest to holders<\u002Fdiv>\n        <div class=\"attr\"><b>Spends like cash, 24/7<\u002Fb> — but no legal tender or deposit insurance<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-src\">BIS, FSI Briefs No. 27 (2025); Brookings (2025); GENIUS Act (2025)<\u002Fdiv>\n    <div class=\"foot-num\">06<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════ SLIDE 07 · How the peg holds ════════════════════ -->\n  <section class=\"paper\" data-label=\"How the peg holds\">\n    <div class=\"frame\">\n      <div class=\"headline build d1\" style=\"position:absolute;left:0;top:0;\">How does it stay at exactly $1?<\u002Fdiv>\n      <div class=\"build d2\" style=\"position:absolute;left:0;top:230px;display:flex;align-items:center;gap:64px;\">\n        <div style=\"font-size:120px;font-weight:700;letter-spacing:-0.04em;\" class=\"tnum\">$1<\u002Fdiv>\n        <div style=\"font-size:88px;color:var(--mute);font-weight:300;\">⇄<\u002Fdiv>\n        <div style=\"font-size:120px;font-weight:700;letter-spacing:-0.04em;\">1 token<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"subhead build d3\" style=\"position:absolute;left:0;top:560px;\">Held by reserves, redemption &amp; <span class=\"jade\">arbitrage<\u002Fspan>.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"peg faint build d3\"><span class=\"peg-label\" style=\"left:auto;right:44px;\">$1.00<\u002Fspan><\u002Fdiv>\n    <div class=\"foot-src\">GENIUS Act (2025): cash or sub-93-day Treasuries only; HK Stablecoins Ordinance (2025)<\u002Fdiv>\n    <div class=\"foot-num\">07<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════ SLIDE 08 · The money machine ════════════════════ -->\n  <section class=\"paper\" data-label=\"The money machine\">\n    <div class=\"frame\">\n      <div class=\"headline build d1\" style=\"position:absolute;left:0;top:0;\">So how do issuers make money?<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"flow build d2\">\n      <div class=\"node\">Your $<\u002Fdiv>\n      <div class=\"conn\"><\u002Fdiv>\n      <div class=\"node\">US Treasuries<\u002Fdiv>\n      <div class=\"conn\"><\u002Fdiv>\n      <div class=\"node jade\">Interest<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"support build d3\" style=\"position:absolute;left:var(--margin);top:800px;color:var(--mute);font-size:32px;\">+ a small <span style=\"color:var(--ink);font-weight:600;\" class=\"tnum\"><span class=\"count\" data-to=\"0.1\" data-dec=\"1\" data-cdelay=\"420\">0.1<\u002Fspan>–<span class=\"count\" data-to=\"0.2\" data-dec=\"1\" data-cdelay=\"420\">0.2<\u002Fspan>%<\u002Fspan> fee to mint or redeem<\u002Fdiv>\n    <div class=\"foot-src\">36Kr (2025); BIS, FSI Briefs No. 27 (2025)<\u002Fdiv>\n    <div class=\"foot-num\">08<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════ SLIDE 09 · Reserve quality ════════════════════ -->\n  <section class=\"paper\" data-label=\"Reserve quality\">\n    <div class=\"frame\">\n      <div class=\"headline build d1\" style=\"position:absolute;left:0;top:0;\">\"We have the reserves.\" — Says who?<\u002Fdiv>\n      <div class=\"build d2\" style=\"position:absolute;left:0;top:218px;right:0;display:grid;grid-template-columns:1fr 1fr;gap:100px;\">\n        <div style=\"border-top:3px solid rgba(22,24,29,0.14);padding-top:38px;\">\n          <div style=\"font-size:24px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--mute);margin-bottom:22px;\">What most issuers provide<\u002Fdiv>\n          <div style=\"font-size:56px;font-weight:700;letter-spacing:-0.025em;line-height:1.1;margin-bottom:26px;\">Attestation<\u002Fdiv>\n          <div style=\"font-size:33px;color:var(--mute);line-height:1.46;\">Management says the reserves exist. An accountant confirms the numbers on paper — but does <em>not<\u002Fem> independently trace each asset back to its real-world source.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-top:3px solid var(--jade);padding-top:38px;\">\n          <div style=\"font-size:24px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--jade);margin-bottom:22px;\">The gold standard<\u002Fdiv>\n          <div style=\"font-size:56px;font-weight:700;letter-spacing:-0.025em;line-height:1.1;color:var(--jade);margin-bottom:26px;\">Full Audit<\u002Fdiv>\n          <div style=\"font-size:33px;color:var(--mute);line-height:1.46;\">An independent auditor traces every reserve asset to its real-world source and formally certifies those assets genuinely exist.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"build d3\" style=\"position:absolute;left:0;top:648px;max-width:1520px;\">\n        <div style=\"font-size:38px;font-weight:500;line-height:1.36;color:var(--ink);\">Stability rests on <span class=\"jade\">trust in the proof<\u002Fspan> — not just the promise.<\u002Fdiv>\n        <div style=\"margin-top:14px;font-size:30px;color:var(--mute);\">Tether's comprehensive independent audit remains pending as of 2025.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-src\">36Kr (2025); BIS FSI Briefs No. 27 (2025)<\u002Fdiv>\n    <div class=\"foot-num\">09<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════ SLIDE 10 · Stablecoins & US debt ════════════════════ -->\n  <section class=\"paper\" data-label=\"Stablecoins &amp; US debt\">\n    <div class=\"frame\">\n      <div class=\"caption build d1\" style=\"position:absolute;left:0;top:30px;letter-spacing:0.18em;text-transform:uppercase;color:var(--mute);\">Why governments care<\u002Fdiv>\n      <div class=\"headline build d2\" style=\"position:absolute;left:0;top:120px;max-width:1500px;\">\n        Every dollar in becomes <span class=\"jade\">new demand for US debt<\u002Fspan>.\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"flow build d3\">\n      <div class=\"node\">Your $<\u002Fdiv>\n      <div class=\"conn\"><\u002Fdiv>\n      <div class=\"node\">USDT<\u002Fdiv>\n      <div class=\"conn\"><\u002Fdiv>\n      <div class=\"node\">US Treasuries<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-src\">Ante, Saggu &amp; Fiedler (2025), via 36Kr (2025)<\u002Fdiv>\n    <div class=\"foot-num\">10<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════ SLIDE 11 · The global race ════════════════════ -->\n  <section class=\"paper\" data-label=\"The global race\">\n    <div class=\"frame\">\n      <div class=\"headline build d1\" style=\"position:absolute;left:0;top:0;\">Everyone wants in.<\u002Fdiv>\n      <div class=\"chips build d2\" style=\"position:absolute;left:0;top:300px;\">\n        <div class=\"chip\"><span class=\"chip-k\">GENIUS Act<\u002Fspan> <span class=\"chip-v\">· Jul 2025<\u002Fspan><\u002Fdiv>\n        <div class=\"chip\"><span class=\"chip-k\">Hong Kong<\u002Fspan> <span class=\"chip-v\">· Aug 2025<\u002Fspan><\u002Fdiv>\n        <div class=\"chip\"><span class=\"chip-k\">EU<\u002Fspan> <span class=\"chip-v\">· MiCA<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"subhead build d3\" style=\"position:absolute;left:0;top:560px;max-width:1450px;\">\n        Mainland China restricts crypto — <span class=\"jade\">Hong Kong is the sandbox<\u002Fspan>.\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-src\">Library of Congress (2025); Morgan Lewis (2025); 36Kr (2025)<\u002Fdiv>\n    <div class=\"foot-num\">11<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════ SLIDE 12 · The GENIUS Act ════════════════════ -->\n  <section class=\"paper\" data-label=\"The GENIUS Act\">\n    <div class=\"frame\">\n      <div class=\"headline build d1\" style=\"position:absolute;left:0;top:0;\">What the law actually requires.<\u002Fdiv>\n      <div class=\"build d2\" style=\"position:absolute;left:2px;top:145px;letter-spacing:0.16em;text-transform:uppercase;font-size:24px;color:var(--jade);\">GENIUS Act &nbsp;·&nbsp; Pub. L. 119–27 &nbsp;·&nbsp; Signed July 18, 2025<\u002Fdiv>\n      <div class=\"attrs build d3\" style=\"position:absolute;left:0;top:224px;max-width:1560px;\">\n        <div class=\"attr\"><b class=\"k-jade\">① 1:1 Reserves<\u002Fb> — Cash or sub-93-day Treasuries only; no high-yield, no risky assets.<\u002Fdiv>\n        <div class=\"attr\"><b class=\"k-jade\">② No Interest to Holders<\u002Fb> — Stablecoins cannot pay yield or offer staking to users.<\u002Fdiv>\n        <div class=\"attr\"><b class=\"k-jade\">③ Jurisdictional Carve-out<\u002Fb> — Not a security, not a commodity; SEC &amp; CFTC are excluded.<\u002Fdiv>\n        <div class=\"attr\"><b class=\"k-jade\">④ Dual-track Regulation<\u002Fb> — &gt;$10B → Federal (Fed / OCC)&nbsp;&nbsp;·&nbsp;&nbsp;&lt;$10B → state-level option.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-src\">GENIUS Act, Pub. L. 119–27 (2025); Paul Hastings LLP (2025); DLA Piper (2025); Sidley Austin LLP (2025)<\u002Fdiv>\n    <div class=\"foot-num\">12<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════ SLIDE 13 · Upside & one myth ════════════════════ -->\n  <section class=\"paper\" data-label=\"Upside &amp; one myth\">\n    <div class=\"frame\">\n      <div class=\"build d1\" style=\"position:absolute;left:0;top:0;display:flex;flex-direction:column;gap:22px;\">\n        <div class=\"support mute\" style=\"font-size:34px;\">A dollar account for anyone — no US bank<\u002Fdiv>\n        <div class=\"support mute\" style=\"font-size:34px;\">Cross-border payments in minutes, for cents<\u002Fdiv>\n        <div class=\"support mute\" style=\"font-size:34px;\">24/7, programmable money<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:absolute;left:0;top:470px;\">\n        <div class=\"subhead mute build d3\" style=\"font-weight:500;text-decoration:line-through;text-decoration-thickness:3px;text-decoration-color:var(--mute);\">\"Crypto is private and untraceable.\"<\u002Fdiv>\n        <div class=\"headline build d4\" style=\"margin-top:38px;\">Reality: <span class=\"jade\">public, traceable, freezable<\u002Fspan>.<\u002Fdiv>\n        <div class=\"build d5\" style=\"margin-top:40px;font-size:30px;color:var(--mute);\"><span class=\"count tnum\" data-to=\"3.3\" data-dec=\"1\" data-pre=\"$\" data-suf=\"B\" data-cdelay=\"660\" style=\"color:var(--ink);font-weight:600;\">$3.3B<\u002Fspan> frozen by issuers — 7,000+ wallets, 2023–25<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-src\">Brookings (2025); Chainalysis (2025–26); AMLBot (2025)<\u002Fdiv>\n    <div class=\"foot-num\">13<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════ SLIDE 14 · When it isn't stable ════════════════════ -->\n  <section class=\"paper\" data-label=\"When it isn't stable\">\n    <div class=\"frame\" style=\"inset:var(--margin) var(--margin) auto var(--margin);\">\n      <div class=\"headline build d1\">When stablecoins aren't stable.<\u002Fdiv>\n    <\u002Fdiv>\n    <svg viewBox=\"0 0 1920 1080\" preserveAspectRatio=\"none\" style=\"position:absolute;inset:0;width:100%;height:100%;overflow:visible;\">\n      <line x1=\"154\" y1=\"620\" x2=\"1766\" y2=\"620\" stroke=\"#8A8A8E\" stroke-width=\"2\" stroke-dasharray=\"6 10\"><\u002Fline>\n      <line x1=\"154\" y1=\"620\" x2=\"1120\" y2=\"620\" stroke=\"#16181D\" stroke-width=\"3\"><\u002Fline>\n      <path id=\"s9-drop\" d=\"M1120 620 C 1206 622, 1248 702, 1300 722 C 1372 750, 1452 856, 1560 884\" fill=\"none\" stroke=\"#E5484D\" stroke-width=\"4\" stroke-linecap=\"round\"><\u002Fpath>\n      <circle id=\"s9-usdc\" cx=\"1300\" cy=\"722\" r=\"11\" fill=\"#E5484D\"><\u002Fcircle>\n      <circle id=\"s9-ust\" cx=\"1560\" cy=\"884\" r=\"11\" fill=\"#E5484D\"><\u002Fcircle>\n    <\u002Fsvg>\n    <div class=\"peg-label\" style=\"position:absolute;left:154px;top:574px;font-size:var(--fz-caption);color:var(--mute);font-variant-numeric:tabular-nums;\">$1.00<\u002Fdiv>\n    <div id=\"s9-label-usdc\" class=\"caption\" style=\"position:absolute;left:1330px;top:684px;color:var(--alert);font-weight:600;font-size:26px;line-height:1.3;\">USDC&nbsp;·&nbsp;<span class=\"count\" data-from=\"1\" data-to=\"0.87\" data-dec=\"2\" data-pre=\"~$\" data-cdelay=\"1150\">~$0.87<\u002Fspan><br><span style=\"color:var(--mute);font-weight:400;\">Mar 2023, bank failure<\u002Fspan><\u002Fdiv>\n    <div id=\"s9-label-ust\" class=\"caption\" style=\"position:absolute;left:1090px;width:430px;text-align:right;top:846px;color:var(--alert);font-weight:600;font-size:26px;line-height:1.3;\">UST&nbsp;·&nbsp;collapsed<br><span style=\"color:var(--mute);font-weight:400;\">2022, <span class=\"count\" data-to=\"40\" data-pre=\"~$\" data-suf=\"B\" data-cdelay=\"1700\">~$40B<\u002Fspan> gone<\u002Fspan><\u002Fdiv>\n    <div class=\"subhead build d2\" style=\"position:absolute;left:var(--margin);top:330px;color:var(--ink);\">Runs, depegs &amp; opaque reserves.<\u002Fdiv>\n    <div class=\"foot-src\">Widely reported; Chainalysis, via CryptoTimes (2026)<\u002Fdiv>\n    <div class=\"foot-num\">14<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════ SLIDE 15 · The deeper risks ════════════════════ -->\n  <section class=\"paper\" data-label=\"The deeper risks\">\n    <div class=\"frame\">\n      <div class=\"headline build d1\" style=\"position:absolute;left:0;top:0;\">Three deeper risks.<\u002Fdiv>\n      <div class=\"build d2\" style=\"position:absolute;left:0;top:205px;right:0;display:grid;grid-template-columns:1fr 1fr 1fr;gap:72px;\">\n        <!-- Fire Sales -->\n        <div style=\"border-top:2px solid rgba(22,24,29,0.16);padding-top:32px;\">\n          <div style=\"font-size:24px;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--mute);margin-bottom:20px;\">① Systemic Risk<\u002Fdiv>\n          <div style=\"font-size:46px;font-weight:700;letter-spacing:-0.025em;line-height:1.08;margin-bottom:22px;\">Fire Sales<\u002Fdiv>\n          <div style=\"font-size:30px;color:var(--mute);line-height:1.44;\">A run on a major stablecoin forces rapid mass liquidation of Treasuries — spreading crypto stress into traditional money markets.<\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Seigniorage -->\n        <div style=\"border-top:2px solid rgba(22,24,29,0.16);padding-top:32px;\">\n          <div style=\"font-size:24px;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--mute);margin-bottom:20px;\">② Monetary Sovereignty<\u002Fdiv>\n          <div style=\"font-size:46px;font-weight:700;letter-spacing:-0.025em;line-height:1.08;margin-bottom:22px;\">Seigniorage Loss<\u002Fdiv>\n          <div style=\"font-size:30px;color:var(--mute);line-height:1.44;\">If private stablecoins displace cash, governments lose seigniorage income and central banks lose M1/M2 control.<\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Fraud Profitability -->\n        <div style=\"border-top:2px solid var(--alert);padding-top:32px;\">\n          <div style=\"font-size:24px;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--alert);margin-bottom:20px;\">③ Consumer Risk<\u002Fdiv>\n          <div style=\"font-size:46px;font-weight:700;letter-spacing:-0.025em;line-height:1.08;margin-bottom:22px;\">Fraud Profitability<\u002Fdiv>\n          <div style=\"font-size:30px;color:var(--mute);line-height:1.44;\">No law requires issuers to return stolen funds to victims. Frozen criminal assets can legally accrue to the issuer.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-src\">Brookings (2025); NY State AG James et al. (2025); Fidelity Investments (2025)<\u002Fdiv>\n    <div class=\"foot-num\">15<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════ SLIDE 16 · Companies or central banks? ════════════════════ -->\n  <section class=\"paper\" data-label=\"Companies or central banks\">\n    <div class=\"frame\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n      <div class=\"caption build d1\" style=\"letter-spacing:0.18em;text-transform:uppercase;color:var(--mute);margin-bottom:48px;\">Who should issue digital money?<\u002Fdiv>\n      <div class=\"hero build d2\" style=\"font-size:140px;line-height:1.05;\">Companies, or<br><span class=\"jade\">central banks<\u002Fspan>?<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-src\">Synthesis: Brookings (2025); BIS<\u002Fdiv>\n    <div class=\"foot-num\">16<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════ SLIDE 17 · Conclusion & references ════════════════════ -->\n  <section class=\"paper\" data-label=\"Conclusion &amp; references\">\n    <div class=\"frame\">\n      <div class=\"subhead build d1\" style=\"max-width:1620px;font-size:52px;line-height:1.18;\">\n        A stablecoin is a private digital dollar — held at $1 by <span class=\"jade\">reserves and arbitrage<\u002Fspan>, funded by US Treasuries. The GENIUS Act now defines the rules; the deeper risks are still being written.\n      <\u002Fdiv>\n      <div class=\"build d2\" style=\"position:absolute;left:0;bottom:0;column-count:2;column-gap:90px;width:100%;font-size:24px;line-height:1.5;color:var(--mute);letter-spacing:0;\">\n        <div style=\"font-size:26px;color:var(--ink);font-weight:600;margin-bottom:14px;column-span:all;\">References<\u002Fdiv>\n        <p>1. U.S. Congress. <em>GENIUS Act, Pub. L. 119–27.<\u002Fem> Jul 18, 2025.<\u002Fp>\n        <p>2. Hong Kong SAR. <em>Stablecoins Ordinance (Cap. 656).<\u002Fem> Eff. 1 Aug 2025.<\u002Fp>\n        <p>3. European Union. <em>Markets in Crypto-Assets (MiCA).<\u002Fem> 2023.<\u002Fp>\n        <p>4. BIS. <em>FSI Briefs No. 27 — Stablecoin-related yields.<\u002Fem> 2025.<\u002Fp>\n        <p>5. Ante, Saggu &amp; Fiedler. <em>Tether &amp; Treasury yields.<\u002Fem> 2025.<\u002Fp>\n        <p>6. Brookings Institution. <em>Stablecoins &amp; the GENIUS Act.<\u002Fem> 2025.<\u002Fp>\n        <p>7. Knowledge@Wharton. <em>Stablecoins &amp; the GENIUS Act.<\u002Fem> 2026.<\u002Fp>\n        <p>8. Chainalysis. <em>Stablecoin-tracing analyses.<\u002Fem> 2025–26.<\u002Fp>\n        <p>9. AMLBot / Cryptonews. <em>Stablecoin freezes 2023–25.<\u002Fem> 2026.<\u002Fp>\n        <p>10. Decrypt / DeFiLlama. <em>The Year in Stablecoins 2025.<\u002Fem> 2025.<\u002Fp>\n        <p>11. 36Kr. <em>Analysis of Stablecoins.<\u002Fem> 2025.<\u002Fp>\n        <p>12. 小Lin说. 《一口气了解稳定币》. Bilibili, 2025.<\u002Fp>\n        <p>13. Paul Hastings LLP. <em>The GENIUS Act: A Comprehensive Guide.<\u002Fem> 2025.<\u002Fp>\n        <p>14. DLA Piper. <em>Stablecoins and the GENIUS Act.<\u002Fem> 2025.<\u002Fp>\n        <p>15. Sidley Austin LLP. <em>The GENIUS Act Framework.<\u002Fem> 2025.<\u002Fp>\n        <p>16. Oxford Business Law Blog. <em>GENIUS Act's Regulatory Bifurcation.<\u002Fem> Nov 2025.<\u002Fp>\n        <p>17. NY State AG James et al. <em>Joint Statement on Stablecoin Legislation.<\u002Fem> 2025.<\u002Fp>\n        <p>18. Harris &amp; Rogoff. <em>Digital Asset Regulation Commentary.<\u002Fem> 2025/26.<\u002Fp>\n        <p>19. Fidelity Investments. <em>Systemic Risk &amp; Stablecoins.<\u002Fem> 2025.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-num\">17<\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n\n<script type=\"application/json\" id=\"speaker-notes\">\n[\n  \"Hi everyone. Today [Name] and I are going to talk about stablecoins — a type of cryptocurrency that's designed to always be worth exactly one dollar. They sound boring. But in 2025 they became one of the most fought-over things in global finance. By the end, you'll see why a token that never changes price has governments around the world racing to control it — and why the US actually just passed a landmark law to regulate it.\",\n  \"In 2025, the United States signed the GENIUS Act into law — the first federal stablecoin legislation in US history. Within months, Hong Kong, the EU, the UK, Singapore, and Korea all moved to regulate stablecoins too. That's strange — why would so many governments suddenly write rules for a token that's designed never to change in value? Here's a personal angle: years ago, when I was trading crypto in China, you couldn't just use cash — you first had to convert your money into a stablecoin called USDT. So our question today is simple: what is this $1 token, how does it actually work, and why does the world's biggest economy now feel it needs a federal law for it?\",\n  \"Most cryptocurrencies, like Bitcoin, swing wildly in price — which makes them useless for everyday payments. A stablecoin fixes that by pegging its value to something stable, almost always one US dollar. So one unit of USDT is meant to always equal one dollar. Really, a stablecoin is a private digital dollar: a token you can always redeem for a dollar, which makes it an IOU on the company that issued it, backed one-to-one by reserves it claims to hold. Two coins dominate: Tether's USDT and Circle's USDC — together about 84% of a market worth roughly 306 billion dollars at the end of 2025. But 'stable' is a promise, not a guarantee. In 2022 a different kind of stablecoin, an algorithmic one called UST, broke its peg and collapsed in days. We'll come back to that.\",\n  \"Before going further, one distinction that trips up a lot of beginners. Not all stablecoins work the same way. The mainstream ones — USDT and USDC — are collateralized: every token is backed 1:1 by real assets, typically cash or US Treasuries held by the issuer. But there's a second, much riskier kind: algorithmic stablecoins. These have no real reserves at all. Instead, a mathematical formula and a set of coded incentives is supposed to keep the price at one dollar. The most famous example, UST, collapsed in May 2022 and wiped out roughly 40 billion dollars in just a few days. This deck focuses entirely on collateralized stablecoins — they are the market mainstream and the target of nearly all new regulation, including the GENIUS Act.\",\n  \"Now — where exactly does a stablecoin sit in the world of money? Compare it to cash and a bank deposit. On safety: cash is government money, the safest thing possible. A bank deposit has FDIC insurance up to $250,000. A stablecoin? Only as safe as the private company behind it — no government guarantee. On interest: cash pays nothing, banks pay a little, and stablecoins pay you nothing either — the issuer keeps all the interest. That's the entire business model, and notably the GENIUS Act codifies this: issuers are legally prohibited from paying interest to holders. Where stablecoins genuinely win is speed and access: you can send them anywhere in the world in minutes, around the clock, with nothing but a smartphone — no bank account required.\",\n  \"So what kind of money is this, really? Think of it as a private, fully-reserved money-market instrument — a kind of 'near-money.' It's useful like cash: stable by design, spendable around the clock, and always redeemable for a dollar. But notice what it is and isn't. It earns interest for the issuer, never for you. And unlike the dollars in your bank account, it's a company's liability, not government money — there's no legal-tender status and no deposit insurance standing behind it. The GENIUS Act mandates that these properties are preserved: stablecoins remain a payments tool, not an investment.\",\n  \"How does a private token hold its value at exactly one dollar? Two mechanisms. First, reserves: for every token in circulation, the issuer claims to hold one real dollar — in cash or safe assets — that you can always redeem. The GENIUS Act now specifies exactly what 'safe assets' means: cash or US Treasuries maturing in under 93 days. No risky assets allowed. Second, arbitrage: if the price ever drifts above a dollar, traders create new tokens and sell them for a small profit, pushing the price back down. The whole thing rests on one thing: trust that those reserves are real.\",\n  \"Here's the part most people miss. If the token is basically free to use, how does the company behind it make money? When you hand over a dollar, they buy US government bonds — Treasuries — which pay interest, and they keep that interest for themselves. They also charge a small fee to create or cash out coins. With hundreds of billions of dollars in reserves, that interest adds up to enormous profits. The GENIUS Act cements this model: issuers earn from Treasuries; users get the payment utility but none of the yield.\",\n  \"Here's the hidden risk most introductions skip. When an issuer says 'we have the reserves,' how do you actually verify that? There are two very different levels of proof. An attestation — what most issuers provide — is management saying 'we have the money,' with an accountant confirming the numbers on paper. That is not the same as a full audit, where an independent auditor traces every reserve asset to its real-world source. The GENIUS Act requires regular attestations, but stops short of mandating full audits. As of 2025, Tether — the world's largest stablecoin — has still not completed a comprehensive independent audit. We would never accept that from a bank.\",\n  \"Now the real reason governments care. Because reserves are mostly US Treasuries, every dollar that flows into stablecoins becomes new demand for US government debt. Researchers have found Tether's Treasury buying is now large enough to actually move interest rates. And because these are dollar tokens used all over the world, they quietly extend the dollar's global dominance. The GENIUS Act effectively enshrines this: by mandating US Treasuries as the reserve asset, it turns every new stablecoin dollar into another buyer of US debt. The US doesn't fight stablecoins — it welcomes them, and now it regulates them.\",\n  \"So a global race is on. The US signed the GENIUS Act in July 2025 — the first comprehensive federal stablecoin law. Hong Kong's Stablecoins Ordinance took effect August 1st, 2025. Even Chinese tech giants like JD.com and Ant Group announced plans to enter. There's a fascinating split: mainland China bans crypto trading, while Hong Kong is used as a controlled testing ground. The GENIUS Act is the starting gun for a global regulatory arms race — the US has fired first.\",\n  \"Let's look at what the GENIUS Act actually mandates — four binding rules. First: 1:1 reserves in cash or sub-93-day Treasuries only — no high-yield, no risky assets. Second: stablecoins cannot pay interest or offer staking to users. The logic is deliberate: if they paid yield, they'd compete directly with bank deposits, potentially destabilizing the financial system. Third: a jurisdictional carve-out — compliant stablecoins are explicitly not securities and not commodities, removing them from SEC and CFTC oversight. That's a landmark clarification the industry has sought for years. Fourth: a dual-track system — issuers above $10 billion face mandatory federal supervision under the Federal Reserve and OCC; smaller issuers can opt for state-level licensing. Critics, including Harvard economist Kenneth Rogoff, warn this dual-track risks a 'race to the bottom' as states compete for issuers by weakening standards — echoing the chaotic Free Banking Era of 1837–1865.\",\n  \"So what's actually good about stablecoins? Three big things. One — financial inclusion: anyone with a phone can hold US dollars without a US bank account, a lifeline in countries with runaway inflation. Two — payments: cross-border transfers in minutes for cents. Three — 24/7 programmable money. Now the myth: people assume crypto is private and untraceable. For mainstream stablecoins, the opposite is true. Every transaction is public, forensics firms trace them, and issuers can freeze wallets — Tether alone froze about 3.3 billion dollars across 7,000 wallets between 2023 and 2025. That's powerful for fighting crime, but it's also worth knowing: your 'private' crypto wallet isn't private at all.\",\n  \"But there's a darker side. Stablecoins can suffer bank-run-style panics. In 2022 the algorithmic coin UST collapsed in days, erasing around 40 billion dollars. In March 2023, even the well-respected USDC briefly fell to about 87 cents when a bank holding its reserves failed. And there are deeper structural questions — questions the GENIUS Act doesn't fully answer — which is what the next slide is about.\",\n  \"Beyond peg breaks, three structural risks deserve attention. First, fire sales: if a major stablecoin faces a run, the issuer must rapidly liquidate tens of billions of Treasuries to meet redemptions. That scale of forced selling can disrupt money market liquidity — effectively exporting crypto-sector stress into traditional finance. Fidelity and the BIS have both flagged this as a genuine macro vulnerability. Second, seigniorage loss: governments earn income from issuing currency — the difference between face value and production cost. If private stablecoins displace physical cash, that income shifts to private companies, and central banks lose some M1/M2 control. Third, and most contested legally: fraud profitability. The GENIUS Act has no provision requiring issuers to return stolen or hacked funds to victims. Frozen criminal assets — seized from fraudsters or hackers — can legally accrue to the issuer. The New York Attorney General and a coalition of state prosecutors publicly flagged this as an unresolved loophole.\",\n  \"So where does this leave us? Stablecoins are clearly useful — cheaper payments, dollar access, more transparency — and they prop up the US dollar's global role. The GENIUS Act gives them a legal foundation for the first time. But it leaves open real questions: about reserve quality, fraud protection, systemic risk, and whether private companies should be issuing what is effectively public money. The deeper question — companies or central banks? — is the real battle behind the headlines.\",\n  \"To sum up: a stablecoin is a private digital dollar, held at one dollar by reserves and arbitrage. Issuers profit by parking those reserves in US Treasuries. The GENIUS Act now sets the rules — 1:1 reserves, no interest, outside SEC/CFTC, dual-track oversight. But three deeper risks remain unresolved: fire sales, seigniorage loss, and fraud profitability. That's why the debate is far from over. Thanks for listening — happy to take questions.\"\n]\n<\u002Fscript>\n\n<script src=\"b4614ba0-fa9e-4533-80ed-681863debe8d\"><\u002Fscript>\n<script>\n(function(){\n  const deck = document.querySelector('deck-stage');\n  if(!deck) return;\n  const EASE = 'cubic-bezier(.2,.65,.2,1)';\n  const delayFor = el =>\n    el.classList.contains('d1') ? 80  :\n    el.classList.contains('d2') ? 200 :\n    el.classList.contains('d3') ? 320 :\n    el.classList.contains('d4') ? 440 :\n    el.classList.contains('d5') ? 560 : 0;\n  const canMove = () =>\n    document.visibilityState === 'visible' &&\n    !deck.hasAttribute('noscale') &&\n    !matchMedia('(prefers-reduced-motion:reduce)').matches;\n\n  const fmtNum = (v, dec, pre, suf) =>\n    pre + v.toLocaleString('en-US', {minimumFractionDigits:dec, maximumFractionDigits:dec}) + suf;\n  function animateCount(el){\n    const to    = parseFloat(el.dataset.to);\n    const from  = el.dataset.from !== undefined ? parseFloat(el.dataset.from) : 0;\n    const dec   = el.dataset.dec   ? parseInt(el.dataset.dec)   : 0;\n    const pre   = el.dataset.pre   || '';\n    const suf   = el.dataset.suf   || '';\n    const dur   = el.dataset.cdur  ? parseInt(el.dataset.cdur)  : 900;\n    const delay = el.dataset.cdelay? parseInt(el.dataset.cdelay): 0;\n    const t0 = performance.now() + delay;\n    el.textContent = fmtNum(from, dec, pre, suf);\n    function frame(now){\n      let t = (now - t0) / dur;\n      if(t < 0){ requestAnimationFrame(frame); return; }\n      if(t >= 1){ el.textContent = fmtNum(to, dec, pre, suf); return; }\n      const e = 1 - Math.pow(1 - t, 3);\n      el.textContent = fmtNum(from + (to - from) * e, dec, pre, suf);\n      requestAnimationFrame(frame);\n    }\n    requestAnimationFrame(frame);\n  }\n\n  function play(slide, index){\n    if(!slide || !canMove()) return;\n    slide.querySelectorAll('.build').forEach(el=>{\n      el.animate(\n        [{opacity:0, transform:'translateY(22px)'},{opacity:1, transform:'none'}],\n        {duration:820, delay:delayFor(el), easing:EASE, fill:'backwards'}\n      );\n    });\n    slide.querySelectorAll('.count').forEach(animateCount);\n    if(index === 13){                      // Slide 14 (0-indexed) — peg-break moment\n      const q = s => slide.querySelector(s);\n      const drop = q('#s9-drop');\n      if(drop) drop.animate([{strokeDashoffset:1200},{strokeDashoffset:0}],\n        {duration:1400, delay:450, easing:'cubic-bezier(.5,0,.6,1)', fill:'backwards'});\n      const fall = (el, d) => el && el.animate(\n        [{opacity:0, transform:'translateY(-24px)'},{opacity:1, transform:'none'}],\n        {duration:720, delay:d, easing:EASE, fill:'backwards'});\n      fall(q('#s9-usdc'), 1050);\n      fall(q('#s9-ust'), 1550);\n      const fade = (el, d) => el && el.animate([{opacity:0},{opacity:1}],\n        {duration:600, delay:d, fill:'backwards'});\n      fade(q('#s9-label-usdc'), 1200);\n      fade(q('#s9-label-ust'), 1700);\n    }\n  }\n\n  deck.addEventListener('slidechange', e => play(e.detail.slide, e.detail.index));\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
