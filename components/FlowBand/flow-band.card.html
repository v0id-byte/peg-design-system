<!-- @dsCard group="Components" viewport="700x100" subtitle="Arrow-connected node flow" name="FlowBand" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--paper);font-family:var(--font);padding:24px 28px;-webkit-font-smoothing:antialiased;}
  .flow{display:flex;align-items:center;}
  .node{flex-shrink:0;font-size:22px;font-weight:600;letter-spacing:-0.02em;line-height:1;color:var(--ink);}
  .node.jade{color:var(--jade);}
  .conn{flex:1;height:2px;background:rgba(22,24,29,.22);position:relative;margin:0 18px;}
  .conn::after{content:"";position:absolute;right:-1px;top:50%;transform:translateY(-50%);
    border-left:9px solid rgba(22,24,29,.34);
    border-top:6px solid transparent;border-bottom:6px solid transparent;}
</style>
</head>
<body>
<div class="flow">
  <div class="node">Your $</div>
  <div class="conn"></div>
  <div class="node">US Treasuries</div>
  <div class="conn"></div>
  <div class="node jade">Interest</div>
</div>
</body>
</html>
